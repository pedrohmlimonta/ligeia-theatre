<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ligéia Theatre — Palco</title>
  <link rel="stylesheet" href="/css/theatre.css" />
</head>
<body>
  <!-- O palco fica em uma faixa inferior. O resto da tela é transparente
       e não-clicável (pointer-events: none no container, auto só nos elementos). -->
  <div id="theatre-root" class="theatre-root">
    <div id="stage" class="stage" data-empty="true">
      <div id="portraits" class="portraits"></div>
      <div id="dialogue-box" class="dialogue-box hidden">
        <div id="dialogue-name" class="dialogue-name"></div>
        <div id="dialogue-text" class="dialogue-text"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/theatre.js"></script>
</body>
</html>
